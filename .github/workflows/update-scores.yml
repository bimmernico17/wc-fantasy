name: Update World Cup Fantasy Scores

on:
  schedule:
    # Runs every 30 minutes between 11:00–23:59 UTC.
    # Adjust this window to match actual World Cup kickoff times in UTC.
    # Budget check: worst case ~2 fixtures live at once, polled every 30 min
    # over a 13-hour window = 26 polls/day. Each poll = 1 call for the live
    # list + 1 call per live fixture for player stats. Even with 2 concurrent
    # matches that's 26 * 3 = 78 calls/day — comfortably under the 100/day
    # free tier cap, with room left for manual runs.
    - cron: "*/30 11-23 * * *"
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

jobs:
  update-scores:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run score update script
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
          CURRENT_GW: "1" # bump this manually as the tournament progresses
        run: node update-scores.js
